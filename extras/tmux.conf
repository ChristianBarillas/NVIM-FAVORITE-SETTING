# ══════════════════════════════════════════════════════════════════════
# tmux.conf — NVIM-FAVORITE-SETTING (extras/)
# Se enlaza como ~/.config/tmux/tmux.conf (install.sh lo hace solo).
# El prefijo es el default: Ctrl-b (así todos los tutoriales coinciden).
# Sirve igual en la Mac y copiado a servidores Ubuntu.
# ══════════════════════════════════════════════════════════════════════

# Colores reales (true color) dentro de tmux — Neovim se ve idéntico
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

set -s escape-time 10          # Esc instantáneo en Neovim (crítico)
set -g focus-events on         # Neovim detecta el foco (autoread, blame)
set -g mouse on                # scroll y click mientras aprendes
set -g history-limit 50000     # scrollback grande
set -g base-index 1            # ventanas numeradas desde 1
setw -g pane-base-index 1
set -g renumber-windows on     # sin huecos al cerrar ventanas
setw -g mode-keys vi           # copiar con hjkl / v / y, como en vim

# Splits intuitivos (además de los originales % y ")
# prefijo + | = dividir vertical · prefijo + - = dividir horizontal
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Moverse entre paneles con prefijo + h j k l (como en Neovim)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Recargar esta configuración: prefijo + r
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf recargado"

# Barra de estado sobria, a juego con solarized
set -g status-style "bg=#073642,fg=#839496"
set -g window-status-current-style "bg=#586e75,fg=#fdf6e3,bold"
set -g status-left-length 24
set -g status-left "#[bold] #S » "
set -g status-right " %H:%M "
